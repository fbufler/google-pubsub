version: "3"

tasks:
    default:
        desc: List all tasks
        cmds:
            - task --list

    # --- Proto ---
    proto:update:
        desc: Fetch the latest pubsub proto spec from googleapis/googleapis
        vars:
            BASE: https://raw.githubusercontent.com/googleapis/googleapis/master
            DIR: proto/google/pubsub/v1
        cmds:
            - curl -fsSL {{.BASE}}/google/pubsub/v1/pubsub.proto -o {{.DIR}}/pubsub.proto
            - curl -fsSL {{.BASE}}/google/pubsub/v1/schema.proto  -o {{.DIR}}/schema.proto
            - buf dep update

    proto:generate:
        desc: Generate Go code from proto definitions
        cmds:
            - buf generate
            - go mod tidy

    proto:lint:
        desc: Lint proto files
        cmds:
            - buf lint

    proto:breaking:
        desc: Check for breaking changes against main branch
        cmds:
            - buf breaking --against '.git#branch=main'

    # --- Build ---
    build:
        desc: Build the emulator binary
        cmds:
            - go build -o bin/emulator ./cmd/server

    # --- Lint ---
    lint:
        desc: Run golangci-lint
        cmds:
            - golangci-lint run ./...

    # --- Tests ---
    test:unit:
        desc: Run unit tests
        cmds:
            - go test ./internal/... -v

    test:integration:official:
        desc: Run integration tests against the real Google PubSub emulator
        cmds:
            - docker compose up -d real-emulator
            - defer: docker compose stop real-emulator
            - PUBSUB_EMULATOR_HOST=localhost:8085 PUBSUB_PROJECT_ID=test-project go test ./test/integration/... -v -tags integration -timeout 120s -count=1 -skip "TestReflection|TestHealthEndpoints"

    test:integration:ours:
        desc: Run integration tests against our emulator
        deps:
            - docker:build
        cmds:
            - docker compose up -d our-emulator
            - defer: docker compose stop our-emulator
            - PUBSUB_EMULATOR_HOST=localhost:8086 PUBSUB_PROJECT_ID=test-project go test ./test/integration/... -v -tags integration -timeout 120s -count=1

    test:all:
        desc: Run unit tests + integration tests against both emulators
        cmds:
            - task: test:unit
            - task: test:integration:official
            - task: test:integration:ours

    # TODO: Should run directly in the container and we need to clean this up
    test:coverage:
        desc: Build a coverage-instrumented binary, run integration tests against it, and report coverage
        cmds:
            - go build -cover -coverpkg=./... -o bin/emulator-cov ./cmd/server
            - |
                rm -rf coverdata && mkdir -p coverdata
                GOCOVERDIR=./coverdata LISTEN_ADDR=:8087 GOLANG_PROTOBUF_REGISTRATION_CONFLICT=warn \
                  ./bin/emulator-cov &
                COV_PID=$!
                for i in $(seq 1 30); do
                  curl -sf http://localhost:8087/healthz >/dev/null 2>&1 && break
                  sleep 0.5
                done
                PUBSUB_EMULATOR_HOST=localhost:8087 PUBSUB_PROJECT_ID=test-project \
                  go test ./test/integration/... -tags integration -timeout 120s -count=1
                TEST_EXIT=$?
                pkill -TERM -f './bin/emulator-cov' 2>/dev/null || true
                for i in $(seq 1 20); do
                  pgrep -f './bin/emulator-cov' >/dev/null 2>&1 || break
                  sleep 0.5
                done
                exit $TEST_EXIT
            - go tool covdata textfmt -i=./coverdata -o=coverage.txt
            - go tool cover -func=coverage.txt | tail -1
            - go tool cover -html=coverage.txt -o=coverage.html
            - echo "HTML report written to coverage.html"

    # --- Benchmarks ---
    bench:official:
        desc: Run benchmarks against the official Google PubSub emulator
        cmds:
            - docker compose up -d real-emulator
            - defer: docker compose stop real-emulator
            - PUBSUB_EMULATOR_HOST=localhost:8085 PUBSUB_PROJECT_ID=test-project go test ./test/benchmark/... -tags benchmark -bench=. -benchmem -benchtime=5s -count=1 -timeout 180s

    bench:ours:
        desc: Run benchmarks against our emulator
        deps:
            - docker:build
        cmds:
            - docker compose up -d our-emulator
            - defer: docker compose stop our-emulator
            - PUBSUB_EMULATOR_HOST=localhost:8086 PUBSUB_PROJECT_ID=test-project go test ./test/benchmark/... -tags benchmark -bench=. -benchmem -benchtime=5s -count=1 -timeout 180s

    # --- Tracing ---
    trace:up:
        desc: Start Jaeger and the emulator with tracing enabled (UI at http://localhost:16686)
        deps:
            - docker:build
        env:
            OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
        cmds:
            - docker compose up -d jaeger our-emulator
            - echo "Jaeger UI  → http://localhost:16686"
            - echo "Emulator   → http://localhost:8086"

    trace:down:
        desc: Stop Jaeger and the emulator
        cmds:
            - docker compose stop jaeger our-emulator

    # --- Docker ---
    docker:build:
        desc: Build the emulator Docker image
        cmds:
            - docker build -t google-pubsub-emulator:local .

    docker:up:
        desc: Start all services
        cmds:
            - docker compose up -d

    docker:down:
        desc: Stop all services
        cmds:
            - docker compose down

    docker:logs:
        desc: Tail logs for all services
        cmds:
            - docker compose logs -f

    # --- CI ---
    ci:update:
        desc: Fetch latest proto spec, regenerate, test both emulators, commit if tests pass
        cmds:
            - task: proto:update
            - task: proto:generate
            - task: proto:lint
            - task: test:integration:official
            - task: docker:build
            - task: test:integration:ours
            - |
                if git diff --quiet && git diff --staged --quiet; then
                  echo "No changes to commit."
                else
                  git add proto/google/pubsub/v1/pubsub.proto \
                          proto/google/pubsub/v1/schema.proto \
                          gen/ buf.lock go.mod go.sum
                  git commit -m "chore: update pubsub proto spec and regenerate

                Fetched latest google/pubsub/v1 proto from googleapis/googleapis.
                All integration tests pass against both the real emulator and ours."
                  echo "Changes committed."
                fi
